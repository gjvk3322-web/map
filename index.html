<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>돌봄매트 실전 시뮬레이터 (AI 최적화 + 드래그)</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #1e1e1e; color: #ffffff; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        #control-panel { width: 340px; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h2 { margin-top: 0; color: #1dd1a1; font-size: 20px; margin-bottom: 5px; }
        
        .section-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .section-title { font-size: 14px; color: #77acf1; font-weight: bold; margin-bottom: 10px; margin-top: 0; }
        
        input[type="file"] { width: 100%; color: #aaa; font-size: 12px; margin-bottom: 10px; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        .tool-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s; background: #444; }
        .tool-btn.active { background: #77acf1; box-shadow: 0 0 8px rgba(119, 172, 241, 0.5); }
        .tool-btn:hover:not(.active) { background: #555; }
        
        /* 스텝별 버튼 강조 색상 */
        #btnCalibrate { background: #9b59b6; width: 100%; margin-bottom: 5px;}
        #btnCalibrate.active { background: #8e44ad; border: 2px solid #fff;}
        #btnMagic { background: #f39c12; width: 100%; margin-bottom: 5px; color: #fff;}
        #btnMagic.active { background: #e67e22; border: 2px solid #fff;}
        #btnDragGrid { background: #444; width: 100%; margin-top: 10px;}
        #btnDragGrid.active { background: #77acf1; border: 2px solid #fff;}

        /* AI 자동 최적화 버튼 강조 */
        .ai-optimize-btn { background: #ff4757; color: white; font-size: 15px; text-align: center; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4);}
        .ai-optimize-btn:hover { background: #ff6b81; transform: translateY(-2px); }

        .clear-btn { background: #ff6b6b; width: 100%; margin-top: 5px; }
        .clear-btn:hover { background: #ff4757; }

        #result-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; text-align: center; margin-top: auto;}
        #result-box h3 { margin: 0; color: #fff; font-size: 14px; }
        #mat-count { font-size: 44px; font-weight: bold; color: #ff4757; margin: 5px 0; }
        .unit { font-size: 14px; color: #aaa; font-weight: normal; }

        #canvas-wrap { flex: 1; background: #111; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 8px 16px rgba(0,0,0,0.3); border: 1px solid #333; display: flex; justify-content: center; align-items: center;}
        canvas { background-color: #ffffff; max-width: 100%; max-height: 100%; object-fit: contain; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair;}
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>✨ 스마트 도면 플래너</h2>
        
        <div class="section-box">
            <h3 class="section-title">1. 도면 올리고 스케일 맞추기</h3>
            <input type="file" id="bgUploader" accept="image/*">
            <button id="btnCalibrate" class="tool-btn">📏 1. 실제 길이 입력 (필수)</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 0 0;">도면 위 선(예: 4.50)을 마우스로 드래그하세요.</p>
        </div>

        <div class="section-box">
            <h3 class="section-title">2. 시공 공간 스캔</h3>
            <button id="btnMagic" class="tool-btn">🪄 2. 방바닥 자동 스캔 (원클릭)</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 10px 0;">클릭하면 벽을 인식해 바닥을 자동 색칠합니다.</p>
            <div class="btn-group">
                <button id="btnDraw" class="tool-btn">🖌️ 수동 칠하기</button>
                <button id="btnErase" class="tool-btn">🧽 지우개</button>
            </div>
            <button id="btnClearMask" class="tool-btn clear-btn">🗑️ 색칠 초기화</button>
        </div>
        
        <div class="section-box" style="border-color: #ff4757;">
            <h3 class="section-title" style="color: #ff4757;">3. 매트 최적 배치 찾기</h3>
            
            <button id="btnAIOptimize" class="ai-optimize-btn">✨ 3. AI 최소 장수 자동 찾기</button>
            
            <button id="btnDragGrid" class="tool-btn active">🖐️ (수동) 그리드 이동 미세조정</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 0 0;">도면 위를 드래그하여 기준점을 미세조정하세요.</p>
        </div>

        <div id="result-box">
            <h3>필요한 1m 매트 수량</h3>
            <div id="mat-count">0<span class="unit"> 장</span></div>
            <p id="saving-msg" style="font-size: 12px; color: #1dd1a1; margin: 5px 0 0 0; display: none; font-weight: bold;">AI가 최적의 위치를 찾았습니다!</p>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="roomCanvas" width="800" height="800"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('roomCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let bgImg = null;
        let pixelsPerMeter = 100; 
        let floorMask = null; 

        let mode = 'dragGrid'; 
        let brushSize = 30;

        let gridOffsetX = 0;
        let gridOffsetY = 0;
        let isDraggingGrid = false;
        let lastMousePos = null;

        let calibStart = null;
        let isDrawing = false;
        let activeMats = [];

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        document.getElementById('bgUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                bgImg = new Image();
                bgImg.onload = function() {
                    canvas.width = bgImg.width;
                    canvas.height = bgImg.height;
                    floorMask = new Uint8Array(canvas.width * canvas.height);
                    pixelsPerMeter = canvas.width / 10;
                    gridOffsetX = 0; gridOffsetY = 0;
                    document.getElementById('saving-msg').style.display = 'none';
                    redraw();
                };
                bgImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function setMode(newMode, btnId) {
            mode = newMode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            if(btnId) document.getElementById(btnId).classList.add('active');
            
            if (mode === 'dragGrid') canvas.style.cursor = 'grab';
            else if (mode === 'magic') canvas.style.cursor = 'cell';
            else canvas.style.cursor = 'crosshair';
        }

        document.getElementById('btnCalibrate').addEventListener('click', () => { setMode('calibrate', 'btnCalibrate'); alert("도면 위의 수치 선(예: 4.5m)을 마우스로 드래그하세요!"); });
        document.getElementById('btnMagic').addEventListener('click', () => setMode('magic', 'btnMagic'));
        document.getElementById('btnDraw').addEventListener('click', () => setMode('draw', 'btnDraw'));
        document.getElementById('btnErase').addEventListener('click', () => setMode('erase', 'btnErase'));
        document.getElementById('btnDragGrid').addEventListener('click', () => setMode('dragGrid', 'btnDragGrid'));
        
        document.getElementById('btnClearMask').addEventListener('click', () => {
            if(floorMask) floorMask.fill(0);
            document.getElementById('saving-msg').style.display = 'none';
            calculateMats();
            redraw();
        });

        // ------------------ 마우스 이벤트 ------------------
        canvas.addEventListener('mousedown', (e) => {
            if (!bgImg) return;
            const pos = getMousePos(e);

            if (mode === 'calibrate') {
                calibStart = pos;
                isDrawing = true;
            } else if (mode === 'draw' || mode === 'erase') {
                isDrawing = true;
                paintBrush(pos.x, pos.y);
            } else if (mode === 'magic') {
                magicWand(Math.floor(pos.x), Math.floor(pos.y));
            } else if (mode === 'dragGrid') {
                isDraggingGrid = true;
                lastMousePos = pos;
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!bgImg) return;
            const pos = getMousePos(e);

            if (mode === 'calibrate' && isDrawing) {
                lastMousePos = pos;
                redraw();
            } else if ((mode === 'draw' || mode === 'erase') && isDrawing) {
                paintBrush(pos.x, pos.y);
            } else if (mode === 'dragGrid' && isDraggingGrid) {
                let dx = pos.x - lastMousePos.x;
                let dy = pos.y - lastMousePos.y;
                
                gridOffsetX = (gridOffsetX + dx) % pixelsPerMeter;
                gridOffsetY = (gridOffsetY + dy) % pixelsPerMeter;
                
                if (gridOffsetX < 0) gridOffsetX += pixelsPerMeter;
                if (gridOffsetY < 0) gridOffsetY += pixelsPerMeter;
                
                lastMousePos = pos;
                document.getElementById('saving-msg').style.display = 'none'; // 수동 조작 시 AI 메세지 숨김
                calculateMats(); 
                redraw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!bgImg) return;
            const pos = getMousePos(e);
            
            if (mode === 'calibrate' && isDrawing) {
                isDrawing = false;
                let distPx = Math.hypot(pos.x - calibStart.x, pos.y - calibStart.y);
                if (distPx > 20) {
                    let actualMeters = prompt("선이 그어진 실제 길이는 몇 m 입니까? (예: 4.5)");
                    if (actualMeters && !isNaN(actualMeters) && actualMeters > 0) {
                        pixelsPerMeter = distPx / actualMeters;
                        alert(`적용 완료! (1m = ${Math.round(pixelsPerMeter)}픽셀)\n이제 2번 '방바닥 자동 스캔'을 눌러 면적을 지정하세요.`);
                        setMode('magic', 'btnMagic');
                    }
                }
                calibStart = null;
                redraw();
            } else if (mode === 'draw' || mode === 'erase') {
                isDrawing = false;
                calculateMats();
                redraw();
            } else if (mode === 'dragGrid') {
                isDraggingGrid = false;
                canvas.style.cursor = 'grab';
            }
        });

        // ------------------ 도구 알고리즘 ------------------
        function paintBrush(x, y) {
            const r = brushSize;
            const startY = Math.max(0, Math.floor(y - r));
            const endY = Math.min(canvas.height, Math.floor(y + r));
            const startX = Math.max(0, Math.floor(x - r));
            const endX = Math.min(canvas.width, Math.floor(x + r));
            const val = (mode === 'draw') ? 1 : 0;
            const rSq = r * r;

            for (let cy = startY; cy < endY; cy++) {
                for (let cx = startX; cx < endX; cx++) {
                    if ((cx - x)*(cx - x) + (cy - y)*(cy - y) <= rSq) {
                        floorMask[cy * canvas.width + cx] = val;
                    }
                }
            }
            redraw();
        }

        function magicWand(startX, startY) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const w = canvas.width;
            const h = canvas.height;
            
            function isFloor(x, y) {
                const idx = (y * w + x) * 4;
                const brightness = (imgData[idx] + imgData[idx+1] + imgData[idx+2]) / 3;
                return brightness > 150; 
            }

            if (!isFloor(startX, startY)) {
                alert("검은 벽이나 선을 클릭했습니다. 안쪽 밝은 방바닥을 클릭해주세요!");
                return;
            }

            const queue = [[startX, startY]];
            const visited = new Uint8Array(w * h);
            visited[startY * w + startX] = 1;

            while (queue.length > 0) {
                const [x, y] = queue.pop();
                floorMask[y * w + x] = 1;

                const dirs = [[1,0], [-1,0], [0,1], [0,-1]];
                for (let [dx, dy] of dirs) {
                    const nx = x + dx;
                    const ny = y + dy;
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                        const idx = ny * w + nx;
                        if (!visited[idx] && isFloor(nx, ny)) {
                            visited[idx] = 1;
                            queue.push([nx, ny]);
                        }
                    }
                }
            }
            
            document.getElementById('saving-msg').style.display = 'none';
            calculateMats(); 
            setMode('dragGrid', 'btnDragGrid'); 
            redraw();
        }

        function calculateMats() {
            if (!floorMask) return;
            activeMats = [];
            let count = 0;
            const PPM = Math.round(pixelsPerMeter); 
            const step = 8; // 퍼포먼스 최적화

            for (let y = gridOffsetY - PPM; y < canvas.height; y += PPM) {
                for (let x = gridOffsetX - PPM; x < canvas.width; x += PPM) {
                    let isOverlap = false;
                    const startY = Math.max(0, Math.floor(y));
                    const endY = Math.min(canvas.height, Math.floor(y + PPM));
                    const startX = Math.max(0, Math.floor(x));
                    const endX = Math.min(canvas.width, Math.floor(x + PPM));

                    for (let cy = startY; cy < endY; cy += step) {
                        for (let cx = startX; cx < endX; cx += step) {
                            if (floorMask[cy * canvas.width + cx] === 1) {
                                isOverlap = true; break;
                            }
                        }
                        if (isOverlap) break;
                    }

                    if (isOverlap) {
                        count++;
                        activeMats.push({x: x, y: y});
                    }
                }
            }
            document.getElementById('mat-count').innerHTML = count + `<span class="unit"> 장</span>`;
            return count; // AI 탐색용 반환값
        }

        // ★ 핵심 추가: AI 최적화 오토-시뮬레이션 ★
        document.getElementById('btnAIOptimize').addEventListener('click', () => {
            if (!floorMask) {
                alert("먼저 방바닥 면적을 자동스캔(색칠) 해주세요!");
                return;
            }
            
            const PPM = Math.round(pixelsPerMeter);
            let minMats = Infinity;
            let bestOffsetX = 0;
            let bestOffsetY = 0;
            
            // X, Y축으로 10픽셀씩 이동시키며 가장 적은 매트가 드는 위치를 브루트 포스 탐색
            const stepSize = Math.max(5, Math.floor(PPM / 10)); // 적절한 탐색 간격 설정
            
            for(let ox = 0; ox < PPM; ox += stepSize) {
                for(let oy = 0; oy < PPM; oy += stepSize) {
                    gridOffsetX = ox;
                    gridOffsetY = oy;
                    
                    let currentCount = calculateMats(); // 임시 계산
                    
                    if (currentCount > 0 && currentCount < minMats) {
                        minMats = currentCount;
                        bestOffsetX = ox;
                        bestOffsetY = oy;
                    }
                }
            }

            // 최적의 위치로 최종 확정
            gridOffsetX = bestOffsetX;
            gridOffsetY = bestOffsetY;
            calculateMats(); 
            redraw();

            // 성공 메세지
            const msgEl = document.getElementById('saving-msg');
            msgEl.innerText = `💡 AI 최적화 완료! 최소 수량은 ${minMats}장 입니다.`;
            msgEl.style.display = 'block';
            setMode('dragGrid', 'btnDragGrid'); // 수동 조정 모드로 진입
        });


        // ------------------ 화면 렌더링 ------------------
        function redraw() {
            if (!bgImg) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImg, 0, 0);

            if (floorMask) {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < floorMask.length; i++) {
                    if (floorMask[i] === 1) {
                        const idx = i * 4;
                        imgData.data[idx] = 119;   
                        imgData.data[idx+1] = 172; 
                        imgData.data[idx+2] = 241; 
                        imgData.data[idx+3] = 100; // 투명도
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }

            if (mode === 'calibrate' && calibStart && lastMousePos && isDrawing) {
                ctx.strokeStyle = '#9b59b6'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(calibStart.x, calibStart.y); ctx.lineTo(lastMousePos.x, lastMousePos.y); ctx.stroke();
                
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath(); ctx.arc(calibStart.x, calibStart.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(lastMousePos.x, lastMousePos.y, 6, 0, Math.PI*2); ctx.fill();
            }

            if (activeMats.length > 0) {
                const PPM = Math.round(pixelsPerMeter);
                ctx.strokeStyle = '#ff4757'; 
                ctx.lineWidth = 2;
                ctx.fillStyle = 'rgba(255, 71, 87, 0.25)'; 
                
                activeMats.forEach(mat => {
                    ctx.fillRect(mat.x, mat.y, PPM, PPM);
                    ctx.strokeRect(mat.x, mat.y, PPM, PPM);
                });
            }

            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            const PPM = Math.round(pixelsPerMeter);
            for (let x = gridOffsetX % PPM; x < canvas.width; x += PPM) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = gridOffsetY % PPM; y < canvas.height; y += PPM) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }
    </script>
</body>
</html>

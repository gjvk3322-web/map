<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>돌봄매트 실무자용 플래너 (그리드 수동 제어)</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #1e1e1e; color: #ffffff; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        #control-panel { width: 340px; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h2 { margin-top: 0; color: #1dd1a1; font-size: 20px; margin-bottom: 5px; }
        
        .section-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .section-title { font-size: 14px; color: #77acf1; font-weight: bold; margin-bottom: 10px; margin-top: 0; }
        
        input[type="file"] { width: 100%; color: #aaa; font-size: 12px; margin-bottom: 10px; }
        .slider-wrap { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #ccc; margin-bottom: 8px;}
        .slider-wrap input[type="range"] { flex: 1; margin: 0 10px; }
        select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 14px; outline: none; margin-bottom: 10px;}

        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        .tool-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s; background: #444; }
        .tool-btn.active { background: #77acf1; box-shadow: 0 0 8px rgba(119, 172, 241, 0.5); }
        .tool-btn:hover:not(.active) { background: #555; }
        
        #btnCalibrate { background: #9b59b6; width: 100%; margin-bottom: 5px;}
        #btnCalibrate.active { background: #8e44ad; border: 2px solid #fff;}
        
        .action-btn { background: #1dd1a1; width: 100%; margin-top: 5px; color: #1e1e1e;}
        .action-btn:hover { background: #10ac84; }
        .clear-btn { background: #ff6b6b; width: 100%; margin-top: 5px; }
        .clear-btn:hover { background: #ff4757; }

        /* 매트 기준점 슬라이더 강조 */
        .grid-control { background: rgba(254, 202, 87, 0.1); border: 1px solid #feca57; padding: 10px; border-radius: 8px; margin-top: 5px;}
        .grid-control span { color: #feca57; font-weight: bold;}

        #result-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; text-align: center; margin-top: auto;}
        #result-box h3 { margin: 0; color: #fff; font-size: 14px; }
        #mat-count { font-size: 40px; font-weight: bold; color: #feca57; margin: 5px 0; }
        .unit { font-size: 14px; color: #aaa; font-weight: normal; }

        #canvas-wrap { flex: 1; background: #111; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 8px 16px rgba(0,0,0,0.3); border: 1px solid #333; display: flex; justify-content: center; align-items: center;}
        /* 캔버스가 화면에 딱 맞게 자동 리사이징 되도록 설정 */
        canvas { background-color: #ffffff; cursor: crosshair; max-width: 100%; max-height: 100%; object-fit: contain;}
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>📐 벽면 기준 매트 플래너</h2>
        
        <div class="section-box">
            <h3 class="section-title">1. 도면 세팅 및 스케일 맞추기</h3>
            <input type="file" id="bgUploader" accept="image/*">
            <div class="slider-wrap">
                <span>투명도</span>
                <input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.7">
                <span id="opacityVal">70%</span>
            </div>
            <button id="btnCalibrate" class="tool-btn">📏 1. 실제 길이 입력 (스케일 보정)</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 0 0;">(도면의 선을 드래그하여 실제 m 길이를 입력하세요)</p>
        </div>

        <div class="section-box">
            <h3 class="section-title">2. 시공할 방 벽면 그리기</h3>
            <button id="btnDraw" class="tool-btn active" style="width: 100%;">📍 2. 벽 모서리 점찍기</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 5px 0;">(방의 모서리들을 순서대로 클릭하세요)</p>
            <button id="btnComplete" class="tool-btn action-btn">✅ 다 그렸음 (도형 닫기)</button>
            <button id="btnClear" class="tool-btn clear-btn">🗑️ 초기화</button>
        </div>
        
        <div class="section-box">
            <h3 class="section-title">3. 매트 기준점 직접 움직이기</h3>
            <select id="matType">
                <option value="100">1m x 1m 매트 시공</option>
                <option value="50">50cm x 50cm 매트 시공</option>
            </select>
            
            <div class="grid-control">
                <div class="slider-wrap">
                    <span>가로 이동</span>
                    <input type="range" id="gridOffsetX" min="0" max="100" step="5" value="0">
                </div>
                <div class="slider-wrap">
                    <span>세로 이동</span>
                    <input type="range" id="gridOffsetY" min="0" max="100" step="5" value="0">
                </div>
                <p style="font-size: 11px; color: #ccc; margin: 0; text-align: center;">슬라이더를 움직여 최적의 시작점을 찾으세요!</p>
            </div>
        </div>

        <div id="result-box">
            <h3>필요한 매트 수량</h3>
            <div id="mat-count">0<span class="unit"> 장</span></div>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="roomCanvas" width="1200" height="1200"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('roomCanvas');
        const ctx = canvas.getContext('2d');
        
        // 내부 캔버스 해상도는 높게(1200), 화면 표시는 CSS로 자동 축소
        const CANVAS_SIZE = 1200; 
        const PIXEL_PER_CM = 1;   
        const GRID_RES = 10;      
        const cols = CANVAS_SIZE / GRID_RES;
        const rows = CANVAS_SIZE / GRID_RES;
        
        let roomGrid = Array.from({length: rows}, () => Array(cols).fill(false));
        let polygonPoints = []; // 사용자가 찍은 모서리 점들
        let isPolygonClosed = false;
        
        let mode = 'draw'; 
        let matSizeCM = parseInt(document.getElementById('matType').value); 
        
        // 그리드 오프셋 (사용자가 슬라이더로 조절)
        let gridOffsetX = 0;
        let gridOffsetY = 0;
        
        let bgImg = null;
        let bgScale = 1.0; 
        let bgOffsetX = 0, bgOffsetY = 0; // 이미지 중앙 정렬용
        let bgOpacity = 0.7;

        let calibStart = null;
        let currentMousePos = null;
        let isDraggingCalib = false;

        // 마우스 좌표 보정 함수 (CSS로 캔버스가 축소되었을 때 정확한 위치 계산)
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // 이미지 업로드 및 자동 축소 맞춤
        document.getElementById('bgUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                bgImg = new Image();
                bgImg.onload = function() {
                    // 이미지가 캔버스에 80% 정도 차도록 넉넉하게 자동 축소
                    const scaleX = (canvas.width * 0.8) / bgImg.width;
                    const scaleY = (canvas.height * 0.8) / bgImg.height;
                    bgScale = Math.min(scaleX, scaleY);
                    
                    // 중앙 정렬 좌표 계산
                    bgOffsetX = (canvas.width - (bgImg.width * bgScale)) / 2;
                    bgOffsetY = (canvas.height - (bgImg.height * bgScale)) / 2;
                    
                    redraw();
                };
                bgImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        document.getElementById('bgOpacity').addEventListener('input', (e) => {
            bgOpacity = parseFloat(e.target.value);
            document.getElementById('opacityVal').innerText = Math.round(bgOpacity * 100) + '%';
            redraw();
        });

        // 매트 크기 변경 및 그리드 슬라이더 연동
        const sliderX = document.getElementById('gridOffsetX');
        const sliderY = document.getElementById('gridOffsetY');

        document.getElementById('matType').addEventListener('change', (e) => {
            matSizeCM = parseInt(e.target.value);
            sliderX.max = matSizeCM; sliderY.max = matSizeCM;
            sliderX.value = 0; sliderY.value = 0;
            gridOffsetX = 0; gridOffsetY = 0;
            calculateMats();
            redraw();
        });

        // 사용자가 슬라이더 움직일 때마다 실시간 그리드 업데이트
        sliderX.addEventListener('input', (e) => { gridOffsetX = parseInt(e.target.value); calculateMats(); redraw(); });
        sliderY.addEventListener('input', (e) => { gridOffsetY = parseInt(e.target.value); calculateMats(); redraw(); });

        // 버튼 제어
        document.getElementById('btnDraw').addEventListener('click', (e) => { mode = 'draw'; updateBtnStyle(e.target); });
        document.getElementById('btnCalibrate').addEventListener('click', (e) => { mode = 'calibrate'; updateBtnStyle(e.target); });
        
        document.getElementById('btnComplete').addEventListener('click', () => {
            if (polygonPoints.length > 2) {
                isPolygonClosed = true;
                rasterizePolygon(); // 다각형 내부를 그리드 배열에 채우기
                calculateMats();    // 매트 개수 계산
                redraw();
            } else {
                alert("적어도 3개 이상의 모서리를 찍어주세요!");
            }
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            polygonPoints = [];
            isPolygonClosed = false;
            roomGrid = Array.from({length: rows}, () => Array(cols).fill(false));
            document.getElementById('mat-count').innerHTML = '0<span class="unit"> 장</span>';
            redraw();
        });

        function updateBtnStyle(activeBtn) {
            document.getElementById('btnDraw').classList.remove('active');
            document.getElementById('btnCalibrate').classList.remove('active');
            activeBtn.classList.add('active');
        }

        // 마우스 이벤트
        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            if (mode === 'calibrate') {
                calibStart = pos;
                isDraggingCalib = true;
            } else if (mode === 'draw' && !isPolygonClosed) {
                polygonPoints.push(pos);
                redraw();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            currentMousePos = pos;
            if (mode === 'calibrate' || (mode === 'draw' && polygonPoints.length > 0 && !isPolygonClosed)) {
                redraw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (mode === 'calibrate' && isDraggingCalib && calibStart) {
                isDraggingCalib = false;
                const pos = getMousePos(e);
                let distPx = Math.hypot(pos.x - calibStart.x, pos.y - calibStart.y);
                
                if (distPx > 10) { 
                    let actualMeters = prompt("방금 그은 선의 실제 길이는 몇 m 입니까? \n(예: 4.5)");
                    if (actualMeters && !isNaN(actualMeters) && actualMeters > 0) {
                        let targetPx = actualMeters * 100;
                        bgScale = (targetPx * bgScale) / distPx;
                        alert("스케일이 맞춰졌습니다! 이제 '벽 모서리 점찍기'를 진행하세요.");
                    }
                }
                calibStart = null;
                mode = 'draw'; 
                updateBtnStyle(document.getElementById('btnDraw'));
                redraw();
            }
        });

        // 다각형(방) 내부를 계산용 그리드(roomGrid)에 색칠하는 수학 알고리즘
        function rasterizePolygon() {
            roomGrid = Array.from({length: rows}, () => Array(cols).fill(false));
            
            // 캔버스의 보이지 않는 영역에 다각형을 그리고, 포함 여부 확인
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            
            tCtx.beginPath();
            tCtx.moveTo(polygonPoints[0].x, polygonPoints[0].y);
            for(let i=1; i<polygonPoints.length; i++) {
                tCtx.lineTo(polygonPoints[i].x, polygonPoints[i].y);
            }
            tCtx.closePath();
            tCtx.fill();

            // 픽셀 데이터를 읽어와서 그리드 배열에 저장 (매우 정확함)
            const imgData = tCtx.getImageData(0, 0, canvas.width, canvas.height).data;
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    let pxX = Math.floor(c * GRID_RES + GRID_RES/2);
                    let pxY = Math.floor(r * GRID_RES + GRID_RES/2);
                    let idx = (pxY * canvas.width + pxX) * 4 + 3; // Alpha channel
                    if (imgData[idx] > 0) {
                        roomGrid[r][c] = true;
                    }
                }
            }
        }

        let requiredMats = [];

        // 실시간 매트 필요 수량 계산
        function calculateMats() {
            if (!isPolygonClosed) return;
            requiredMats = [];
            let count = 0;
            const matGridSize = matSizeCM / GRID_RES; 

            // 사용자가 슬라이더로 조절한 그리드 오프셋 적용
            let offX = gridOffsetX / GRID_RES;
            let offY = gridOffsetY / GRID_RES;

            for(let matCol = -10; matCol <= cols / matGridSize; matCol++) {
                for(let matRow = -10; matRow <= rows / matGridSize; matRow++) {
                    
                    let startC = matCol * matGridSize + offX;
                    let startR = matRow * matGridSize + offY;
                    let matUsed = false;

                    for(let r = 0; r < matGridSize; r++) {
                        for(let c = 0; c < matGridSize; c++) {
                            let checkR = Math.floor(startR + r);
                            let checkC = Math.floor(startC + c);
                            
                            if(checkR >= 0 && checkR < rows && checkC >= 0 && checkC < cols) {
                                if(roomGrid[checkR][checkC]) {
                                    matUsed = true; break;
                                }
                            }
                        }
                        if(matUsed) break;
                    }

                    if(matUsed) {
                        count++;
                        requiredMats.push({x: startC, y: startR});
                    }
                }
            }
            document.getElementById('mat-count').innerHTML = count + `<span class="unit"> 장</span>`;
        }

        // 화면 렌더링
        function redraw() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 도면 그리기 (중앙 정렬)
            if (bgImg) {
                ctx.globalAlpha = bgOpacity;
                const imgW = bgImg.width * bgScale;
                const imgH = bgImg.height * bgScale;
                ctx.drawImage(bgImg, bgOffsetX, bgOffsetY, imgW, imgH);
                ctx.globalAlpha = 1.0; 
            }

            // 모눈종이 그리기 (슬라이더 조절에 따라 선이 함께 움직임)
            ctx.strokeStyle = '#e0e0e0';
            for (let i = gridOffsetX % 100; i <= canvas.width; i += 10) {
                let isBold = (i - (gridOffsetX % 100)) % 100 === 0;
                ctx.lineWidth = isBold ? 1.5 : 0.5; 
                ctx.strokeStyle = isBold ? '#bbbbbb' : '#e0e0e0';
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = gridOffsetY % 100; i <= canvas.height; i += 10) {
                let isBold = (i - (gridOffsetY % 100)) % 100 === 0;
                ctx.lineWidth = isBold ? 1.5 : 0.5; 
                ctx.strokeStyle = isBold ? '#bbbbbb' : '#e0e0e0';
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 사용자가 찍은 방 면적(다각형) 그리기
            if (polygonPoints.length > 0) {
                ctx.fillStyle = isPolygonClosed ? 'rgba(119, 172, 241, 0.4)' : 'transparent';
                ctx.strokeStyle = '#77acf1';
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                ctx.moveTo(polygonPoints[0].x, polygonPoints[0].y);
                for (let i = 1; i < polygonPoints.length; i++) {
                    ctx.lineTo(polygonPoints[i].x, polygonPoints[i].y);
                }
                
                // 아직 닫히지 않았으면 마우스 포인터까지 임시 선 연결
                if (!isPolygonClosed && currentMousePos && mode === 'draw') {
                    ctx.lineTo(currentMousePos.x, currentMousePos.y);
                } else if (isPolygonClosed) {
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.stroke();

                // 모서리 점 포인트
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#77acf1';
                polygonPoints.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                });
            }

            // 스케일 잡기 선
            if (mode === 'calibrate' && calibStart && currentMousePos && isDraggingCalib) {
                ctx.strokeStyle = '#9b59b6'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(calibStart.x, calibStart.y); ctx.lineTo(currentMousePos.x, currentMousePos.y); ctx.stroke();
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath(); ctx.arc(calibStart.x, calibStart.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(currentMousePos.x, currentMousePos.y, 5, 0, Math.PI*2); ctx.fill();
            }

            // 매트 배치 결과 그리기
            if (isPolygonClosed && requiredMats.length > 0) {
                ctx.strokeStyle = '#ff4757'; 
                ctx.lineWidth = 2;
                ctx.fillStyle = 'rgba(255, 71, 87, 0.2)'; 
                
                requiredMats.forEach(mat => {
                    const pxX = mat.x * GRID_RES;
                    const pxY = mat.y * GRID_RES;
                    ctx.fillRect(pxX, pxY, matSizeCM, matSizeCM);
                    ctx.strokeRect(pxX, pxY, matSizeCM, matSizeCM);
                });
            }
        }

        redraw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>돌봄매트 AI 배치 시뮬레이터 (정밀 스케일 패치)</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #1e1e1e; color: #ffffff; margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        
        #control-panel { width: 340px; background: #2d2d2d; padding: 20px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        h2 { margin-top: 0; color: #1dd1a1; font-size: 20px; margin-bottom: 5px; }
        
        .section-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        .section-title { font-size: 14px; color: #77acf1; font-weight: bold; margin-bottom: 10px; margin-top: 0; }
        
        input[type="file"] { width: 100%; color: #aaa; font-size: 12px; margin-bottom: 10px; }
        .slider-wrap { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #ccc; margin-bottom: 8px;}
        .slider-wrap input[type="range"] { flex: 1; margin: 0 10px; }
        select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 14px; outline: none; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 5px; }
        .tool-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 13px; transition: 0.2s; background: #444; }
        .tool-btn.active { background: #77acf1; box-shadow: 0 0 8px rgba(119, 172, 241, 0.5); }
        .tool-btn:hover:not(.active) { background: #555; }
        
        /* 스케일 보정 버튼 강조 */
        #btnCalibrate { background: #9b59b6; width: 100%; margin-top: 5px; margin-bottom: 5px;}
        #btnCalibrate.active { background: #8e44ad; box-shadow: 0 0 10px rgba(155, 89, 182, 0.6); border: 2px solid #fff;}
        
        .clear-btn { background: #ff6b6b; flex: none; width: 100%; margin-top: 5px; }
        .clear-btn:hover { background: #ff4757; }

        .ai-btn { background: #feca57; color: #1e1e1e; font-size: 16px; text-align: center; padding: 15px; margin-top: auto; border-radius: 8px; font-weight: 900; border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(254, 202, 87, 0.3);}
        .ai-btn:hover { background: #ffb142; transform: translateY(-2px); }

        #result-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #444; text-align: center; margin-top: 10px;}
        #result-box h3 { margin: 0; color: #fff; font-size: 14px; }
        #mat-count { font-size: 36px; font-weight: bold; color: #1dd1a1; margin: 5px 0; }
        .unit { font-size: 14px; color: #aaa; font-weight: normal; }

        #canvas-wrap { flex: 1; background: #111; border-radius: 12px; overflow: auto; position: relative; box-shadow: 0 8px 16px rgba(0,0,0,0.3); border: 1px solid #333;}
        canvas { background-color: #ffffff; cursor: crosshair; display: block; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>🛠️ 정밀 도면 매트 플래너</h2>
        
        <div class="section-box">
            <h3 class="section-title">1. 도면 세팅 및 스케일 맞추기</h3>
            <input type="file" id="bgUploader" accept="image/*">
            <div class="slider-wrap">
                <span>투명도</span>
                <input type="range" id="bgOpacity" min="0" max="1" step="0.1" value="0.7">
                <span id="opacityVal">70%</span>
            </div>
            
            <button id="btnCalibrate" class="tool-btn">📏 도면 실제 길이 입력 (자동 크기조절)</button>
            <p style="font-size: 11px; color: #aaa; margin: 5px 0 0 0; line-height: 1.4;">
                위 버튼을 누르고 도면의 치수선(예: 4.5m)을 마우스로 쭉 그어 실제 거리를 입력하세요!
            </p>
        </div>

        <div class="section-box">
            <h3 class="section-title">2. 매트 및 브러쉬 설정</h3>
            <div style="margin-bottom: 10px;">
                <select id="matType">
                    <option value="100">1m x 1m 매트 시공</option>
                    <option value="50">50cm x 50cm 매트 시공</option>
                </select>
            </div>
            <div class="slider-wrap">
                <span>펜 굵기</span>
                <input type="range" id="brushSize" min="10" max="100" step="10" value="30">
                <span id="brushVal">30cm</span>
            </div>
            <div class="btn-group">
                <button id="btnDraw" class="tool-btn active">🖌️ 칠하기</button>
                <button id="btnErase" class="tool-btn">🧽 지우기</button>
            </div>
            <button id="btnClear" class="tool-btn clear-btn">🗑️ 칠한 공간 초기화</button>
        </div>
        
        <button id="btnAI" class="ai-btn">✨ AI 최적 배치 계산</button>

        <div id="result-box">
            <h3>필요한 매트 수량</h3>
            <div id="mat-count">0<span class="unit"> 장</span></div>
            <p id="saving-msg" style="color: #feca57; font-size: 12px; margin: 0; display: none;">기준점 조정으로 자재를 아꼈습니다!</p>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="roomCanvas" width="1500" height="1500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('roomCanvas');
        const ctx = canvas.getContext('2d');
        
        const CANVAS_SIZE = 1500; 
        const PIXEL_PER_CM = 1;   
        const GRID_RES = 10;      
        const cols = CANVAS_SIZE / GRID_RES;
        const rows = CANVAS_SIZE / GRID_RES;
        
        let roomGrid = Array.from({length: rows}, () => Array(cols).fill(false));
        let bestMats = [];
        
        let isDrawing = false;
        let mode = 'draw'; // 'draw', 'erase', 'calibrate'
        let matSizeCM = parseInt(document.getElementById('matType').value); 
        let brushSizeCM = parseInt(document.getElementById('brushSize').value);
        
        let bgImg = null;
        let bgScale = 1.0; // 내부적으로 자동 관리되는 스케일 값
        let bgOpacity = 0.7;

        // 캘리브레이션용 변수
        let calibStart = null;
        let currentMousePos = null;

        document.getElementById('bgUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                bgImg = new Image();
                bgImg.onload = redraw;
                bgImg.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        document.getElementById('bgOpacity').addEventListener('input', (e) => {
            bgOpacity = parseFloat(e.target.value);
            document.getElementById('opacityVal').innerText = Math.round(bgOpacity * 100) + '%';
            redraw();
        });

        document.getElementById('matType').addEventListener('change', (e) => {
            matSizeCM = parseInt(e.target.value);
            bestMats = []; 
            document.getElementById('mat-count').innerHTML = '0<span class="unit"> 장</span>';
            document.getElementById('saving-msg').style.display = 'none';
            redraw();
        });

        document.getElementById('brushSize').addEventListener('input', (e) => {
            brushSizeCM = parseInt(e.target.value);
            document.getElementById('brushVal').innerText = brushSizeCM + 'cm';
        });

        // 툴 변경 버튼
        document.getElementById('btnDraw').addEventListener('click', (e) => { mode = 'draw'; updateBtnStyle(e.target); });
        document.getElementById('btnErase').addEventListener('click', (e) => { mode = 'erase'; updateBtnStyle(e.target); });
        document.getElementById('btnCalibrate').addEventListener('click', (e) => { 
            mode = 'calibrate'; 
            updateBtnStyle(e.target); 
            alert("도면 상에서 길이를 알고 있는 두 점(예: 4.50 이라고 적힌 벽의 양 끝)을 마우스로 쭉 드래그해서 선을 그어주세요.");
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            roomGrid = Array.from({length: rows}, () => Array(cols).fill(false));
            bestMats = [];
            document.getElementById('mat-count').innerHTML = '0<span class="unit"> 장</span>';
            document.getElementById('saving-msg').style.display = 'none';
            redraw();
        });

        function updateBtnStyle(activeBtn) {
            document.getElementById('btnDraw').classList.remove('active');
            document.getElementById('btnErase').classList.remove('active');
            document.getElementById('btnCalibrate').classList.remove('active');
            activeBtn.classList.add('active');
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mouseleave', () => { if(isDrawing) endPosition(); });
        canvas.addEventListener('mousemove', draw);

        function startPosition(e) { 
            isDrawing = true; 
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (mode === 'calibrate') {
                calibStart = {x: x, y: y};
            } else {
                draw(e); 
            }
        }

        function endPosition(e) { 
            if (!isDrawing) return;
            isDrawing = false; 

            if (mode === 'calibrate' && calibStart) {
                const rect = canvas.getBoundingClientRect();
                const endX = e.clientX - rect.left;
                const endY = e.clientY - rect.top;
                
                let distPx = Math.hypot(endX - calibStart.x, endY - calibStart.y);
                
                if (distPx > 10) { // 너무 짧은 클릭은 무시
                    let actualMeters = prompt("방금 그은 선의 실제 길이는 몇 m 입니까? \n(소수점 입력 가능, 예: 4.5)");
                    if (actualMeters && !isNaN(actualMeters) && actualMeters > 0) {
                        // ★ 핵심 공식: 타겟 픽셀(1m당 100px)에 맞게 백그라운드 스케일을 자동 계산
                        let targetPx = actualMeters * 100;
                        bgScale = (targetPx * bgScale) / distPx;
                        
                        alert(`스케일 세팅 완료! 이제 캔버스의 격자와 실제 도면 크기가 100% 일치합니다.\n이제 '칠하기' 버튼을 누르고 면적을 색칠하세요.`);
                    }
                }
                calibStart = null;
                currentMousePos = null;
                mode = 'draw'; // 스케일 잡으면 자동으로 칠하기 모드로 전환
                updateBtnStyle(document.getElementById('btnDraw'));
                redraw();
            }
        }

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (mode === 'calibrate' && isDrawing) {
                currentMousePos = {x: x, y: y};
                redraw();
                return;
            }

            if (!isDrawing || mode === 'calibrate') return;

            let startCol = Math.max(0, Math.floor((x - brushSizeCM/2) / GRID_RES));
            let endCol = Math.min(cols - 1, Math.floor((x + brushSizeCM/2) / GRID_RES));
            let startRow = Math.max(0, Math.floor((y - brushSizeCM/2) / GRID_RES));
            let endRow = Math.min(rows - 1, Math.floor((y + brushSizeCM/2) / GRID_RES));

            for(let r = startRow; r <= endRow; r++) {
                for(let c = startCol; c <= endCol; c++) {
                    let cellCX = c * GRID_RES + GRID_RES/2;
                    let cellCY = r * GRID_RES + GRID_RES/2;
                    let dist = Math.sqrt(Math.pow(cellCX - x, 2) + Math.pow(cellCY - y, 2));
                    if (dist <= brushSizeCM/2) {
                        roomGrid[r][c] = (mode === 'draw');
                    }
                }
            }
            redraw(); 
        }

        function redraw() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 도면 그리기
            if (bgImg) {
                ctx.globalAlpha = bgOpacity;
                const imgW = bgImg.width * bgScale;
                const imgH = bgImg.height * bgScale;
                ctx.drawImage(bgImg, 50, 50, imgW, imgH);
                ctx.globalAlpha = 1.0; 
            }

            // 모눈종이 그리기 (100px = 1m)
            ctx.strokeStyle = '#e0e0e0';
            for (let i = 0; i <= canvas.width; i += 10) {
                ctx.lineWidth = (i % 100 === 0) ? 1.5 : 0.5; 
                ctx.strokeStyle = (i % 100 === 0) ? '#bbbbbb' : '#e0e0e0';
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 칠한 영역 그리기
            ctx.fillStyle = 'rgba(119, 172, 241, 0.6)';
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    if(roomGrid[r][c]) {
                        ctx.fillRect(c * GRID_RES, r * GRID_RES, GRID_RES, GRID_RES);
                    }
                }
            }

            // 스케일 잡기 선 그리기
            if (mode === 'calibrate' && calibStart && currentMousePos) {
                ctx.strokeStyle = '#9b59b6';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(calibStart.x, calibStart.y);
                ctx.lineTo(currentMousePos.x, currentMousePos.y);
                ctx.stroke();
                
                // 양 끝 점
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath(); ctx.arc(calibStart.x, calibStart.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(currentMousePos.x, currentMousePos.y, 5, 0, Math.PI*2); ctx.fill();
            }

            // AI 계산 매트 그리기
            if (bestMats.length > 0) {
                ctx.strokeStyle = '#ff4757'; 
                ctx.lineWidth = 2;
                ctx.fillStyle = 'rgba(255, 71, 87, 0.2)'; 
                
                bestMats.forEach(mat => {
                    const pxX = mat.x * GRID_RES;
                    const pxY = mat.y * GRID_RES;
                    ctx.fillRect(pxX, pxY, matSizeCM, matSizeCM);
                    ctx.strokeRect(pxX, pxY, matSizeCM, matSizeCM);
                });
            }
        }

        // AI 최적화 알고리즘
        document.getElementById('btnAI').addEventListener('click', () => {
            let minMatsNeeded = Infinity;
            let worstMatsNeeded = 0; 
            let optimalMatPositions = [];

            const matGridSize = matSizeCM / GRID_RES; 

            for(let offsetX = 0; offsetX < matGridSize; offsetX++) {
                for(let offsetY = 0; offsetY < matGridSize; offsetY++) {
                    
                    let currentMatsNeeded = 0;
                    let currentMatPositions = [];

                    for(let matCol = -1; matCol <= cols / matGridSize; matCol++) {
                        for(let matRow = -1; matRow <= rows / matGridSize; matRow++) {
                            
                            let startC = matCol * matGridSize + offsetX;
                            let startR = matRow * matGridSize + offsetY;
                            let matUsed = false;

                            for(let r = 0; r < matGridSize; r++) {
                                for(let c = 0; c < matGridSize; c++) {
                                    let checkR = startR + r;
                                    let checkC = startC + c;
                                    
                                    if(checkR >= 0 && checkR < rows && checkC >= 0 && checkC < cols) {
                                        if(roomGrid[checkR][checkC]) {
                                            matUsed = true;
                                            break;
                                        }
                                    }
                                }
                                if(matUsed) break;
                            }

                            if(matUsed) {
                                currentMatsNeeded++;
                                currentMatPositions.push({x: startC, y: startR});
                            }
                        }
                    }

                    if(currentMatsNeeded > worstMatsNeeded) worstMatsNeeded = currentMatsNeeded;

                    if(currentMatsNeeded > 0 && currentMatsNeeded < minMatsNeeded) {
                        minMatsNeeded = currentMatsNeeded;
                        optimalMatPositions = currentMatPositions;
                    }
                }
            }

            if (minMatsNeeded === Infinity) {
                alert("브러쉬로 시공할 공간을 먼저 색칠해주세요!");
                return;
            }

            bestMats = optimalMatPositions;
            document.getElementById('mat-count').innerHTML = minMatsNeeded + `<span class="unit"> 장 (${matSizeCM}cm)</span>`;
            
            let saved = worstMatsNeeded - minMatsNeeded;
            let msgEl = document.getElementById('saving-msg');
            if (saved > 0) {
                msgEl.innerText = `💡 기준점 미세조정으로 ${saved}장의 매트를 아꼈습니다!`;
                msgEl.style.display = 'block';
            } else {
                msgEl.style.display = 'none';
            }
            
            redraw();
        });

        redraw();
    </script>
</body>
</html>
